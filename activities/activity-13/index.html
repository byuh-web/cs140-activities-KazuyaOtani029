<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">NIKE</div>
        <nav>
            <ul>
                <li><a href="#">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
                <li><a href="#">New & Featured</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>JUST DO IT</h1>
            <p>Discover the latest performance gear and streetwear essentials.</p>
            <button>Shop Now</button>
        </div>
    </section>

    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="https://via.placeholder.com/300x300" alt="Shoe 1">
                <h3>Air Max Pro</h3>
                <p>$180</p>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/300x300" alt="Shoe 2">
                <h3>Zoom Runner</h3>
                <p>$150</p>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/300x300" alt="Shoe 3">
                <h3>Street Flex</h3>
                <p>$130</p>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 Nike. All Rights Reserved.</p>
    </footer>

</body>
</html>
